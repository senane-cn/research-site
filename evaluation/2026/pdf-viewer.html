<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>查阅原文</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f2ec;
        --surface: #ffffff;
        --ink: #202124;
        --muted: #69655d;
        --line: #ddd8ce;
        --accent: #0f6b5e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
      }

      .title {
        display: grid;
        gap: 2px;
        min-width: 220px;
      }

      strong {
        font-size: 15px;
      }

      span {
        color: var(--muted);
        font-size: 12px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      button,
      a {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--ink);
        padding: 0 12px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      button.primary {
        background: var(--accent);
        color: #fff;
      }

      input {
        width: 76px;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 8px;
        font: inherit;
      }

      main {
        display: grid;
        justify-items: center;
        gap: 12px;
        padding: 14px;
      }

      canvas {
        max-width: 100%;
        height: auto;
        background: #fff;
        box-shadow: 0 10px 32px rgba(37, 32, 24, 0.14);
      }

      .status {
        color: var(--muted);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title">
        <strong>ICOMOS 评估报告原文</strong>
        <span id="status">正在载入...</span>
      </div>
      <div class="controls">
        <button id="prevPage" type="button">上一页</button>
        <label>
          <span>页码</span>
          <input id="pageInput" type="number" min="1" value="1">
        </label>
        <button id="nextPage" type="button">下一页</button>
        <button class="primary" id="fitWidth" type="button">适应宽度</button>
        <a id="downloadPdf" href="#" target="_blank" rel="noopener">打开 PDF</a>
      </div>
    </header>
    <main>
      <canvas id="pdfCanvas"></canvas>
      <div class="status" id="pageStatus"></div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs" type="module"></script>
    <script type="module">
      import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs";

      pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs";

      const params = new URLSearchParams(window.location.search);
      const file = params.get("file") || "ICOMOS%E8%AF%84%E4%BC%B0%E6%84%8F%E8%A7%81whc26-48com-inf8B1-en.pdf";
      const initialPage = Math.max(1, Number(params.get("page")) || 1);
      const canvas = document.getElementById("pdfCanvas");
      const context = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const pageStatusEl = document.getElementById("pageStatus");
      const pageInput = document.getElementById("pageInput");
      const downloadPdf = document.getElementById("downloadPdf");
      let pdfDoc = null;
      let pageNumber = initialPage;
      let rendering = false;

      downloadPdf.href = file;

      function availableWidth() {
        return Math.min(window.innerWidth - 28, 1100);
      }

      async function renderPage(nextPageNumber) {
        if (!pdfDoc || rendering) return;
        rendering = true;
        pageNumber = Math.min(Math.max(1, nextPageNumber), pdfDoc.numPages);
        pageInput.value = String(pageNumber);
        statusEl.textContent = `第 ${pageNumber} / ${pdfDoc.numPages} 页`;
        pageStatusEl.textContent = "正在渲染页面...";
        const page = await pdfDoc.getPage(pageNumber);
        const baseViewport = page.getViewport({ scale: 1 });
        const scale = availableWidth() / baseViewport.width;
        const viewport = page.getViewport({ scale });
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.floor(viewport.width * ratio);
        canvas.height = Math.floor(viewport.height * ratio);
        canvas.style.width = `${Math.floor(viewport.width)}px`;
        canvas.style.height = `${Math.floor(viewport.height)}px`;
        context.setTransform(ratio, 0, 0, ratio, 0, 0);
        await page.render({ canvasContext: context, viewport }).promise;
        pageStatusEl.textContent = "";
        rendering = false;
      }

      async function loadPdf() {
        try {
          pdfDoc = await pdfjsLib.getDocument(file).promise;
          pageNumber = Math.min(initialPage, pdfDoc.numPages);
          pageInput.max = String(pdfDoc.numPages);
          await renderPage(pageNumber);
        } catch (error) {
          statusEl.textContent = `原文载入失败：${error.message}`;
          pageStatusEl.textContent = "可尝试点击“打开 PDF”。";
        }
      }

      document.getElementById("prevPage").addEventListener("click", () => renderPage(pageNumber - 1));
      document.getElementById("nextPage").addEventListener("click", () => renderPage(pageNumber + 1));
      document.getElementById("fitWidth").addEventListener("click", () => renderPage(pageNumber));
      pageInput.addEventListener("change", () => renderPage(Number(pageInput.value) || pageNumber));
      window.addEventListener("resize", () => renderPage(pageNumber));

      loadPdf();
    </script>
  </body>
</html>
